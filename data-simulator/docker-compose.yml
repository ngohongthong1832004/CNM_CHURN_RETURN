services:
  data-simulator:
    build: .
    container_name: data-simulator
    environment:
      - KAFKA_BROKERS=broker-1:9094,broker-2:9094,broker-3:9094
      - KAFKA_TOPIC=churn.raw.events
    command:
      - "--n-records"
      - "100"
      - "--kafka-brokers"
      - "broker-1:9094,broker-2:9094,broker-3:9094"
      - "--kafka-topic"
      - "churn.raw.events"
    networks:
      - aio-network

networks:
  aio-network:
    external: true
