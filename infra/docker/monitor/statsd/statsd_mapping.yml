mappings:
  # ── DAG run duration ──────────────────────────────────────────────────────────
  - match: "airflow.dagrun.duration.success.*"
    name: "airflow_dagrun_duration_seconds"
    timer_type: histogram
    labels:
      status: "success"
      dag_id: "$1"

  - match: "airflow.dagrun.duration.failed.*"
    name: "airflow_dagrun_duration_seconds"
    timer_type: histogram
    labels:
      status: "failed"
      dag_id: "$1"

  # ── DAG run schedule delay ────────────────────────────────────────────────────
  - match: "airflow.dagrun.schedule_delay.*"
    name: "airflow_dagrun_schedule_delay_seconds"
    timer_type: histogram
    labels:
      dag_id: "$1"

  # ── Task instance finish ──────────────────────────────────────────────────────
  - match: "airflow.ti.finish.*.*.*"
    name: "airflow_task_finish_total"
    labels:
      dag_id: "$1"
      task_id: "$2"
      status: "$3"

  # ── Task instance start ───────────────────────────────────────────────────────
  - match: "airflow.ti.start.*.*"
    name: "airflow_task_start_total"
    labels:
      dag_id: "$1"
      task_id: "$2"

  # ── Scheduler ─────────────────────────────────────────────────────────────────
  # Airflow 3.x uses underscore: airflow.scheduler_heartbeat
  - match: "airflow.scheduler_heartbeat"
    name: "airflow_scheduler_heartbeat_total"
    labels: {}

  # Airflow 2.x fallback: airflow.scheduler.heartbeat
  - match: "airflow.scheduler.heartbeat"
    name: "airflow_scheduler_heartbeat_total"
    labels: {}

  - match: "airflow.scheduler.tasks.starving"
    name: "airflow_scheduler_tasks_starving"
    labels: {}

  # ── Executor ──────────────────────────────────────────────────────────────────
  - match: "airflow.executor.running_tasks"
    name: "airflow_executor_running_tasks"
    labels: {}

  - match: "airflow.executor.queued_tasks"
    name: "airflow_executor_queued_tasks"
    labels: {}

  - match: "airflow.executor.open_slots"
    name: "airflow_executor_open_slots"
    labels: {}

  # ── DAG processing ────────────────────────────────────────────────────────────
  - match: "airflow.dag_processing.total_parse_time"
    name: "airflow_dag_processing_parse_time_seconds"
    labels: {}

  - match: "airflow.dag_processing.processes"
    name: "airflow_dag_processing_processes"
    labels: {}

  # ── Pool ──────────────────────────────────────────────────────────────────────
  - match: "airflow.pool.open_slots.*"
    name: "airflow_pool_open_slots"
    labels:
      pool_name: "$1"

  - match: "airflow.pool.queued_slots.*"
    name: "airflow_pool_queued_slots"
    labels:
      pool_name: "$1"

  - match: "airflow.pool.running_slots.*"
    name: "airflow_pool_running_slots"
    labels:
      pool_name: "$1"
