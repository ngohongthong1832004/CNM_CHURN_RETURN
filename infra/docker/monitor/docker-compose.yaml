services:
  loki:
    image: grafana/loki:latest
    container_name: aivn-loki
    volumes:
      - ./loki/config.yml:/etc/loki/local-config.yaml
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    ports:
      - "3100:3100"
    networks:
      - aio-network
  
  prometheus:
    image: prom/prometheus:latest
    container_name: aivn-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    restart: unless-stopped
    networks:
      - aio-network

  grafana:
    image: grafana/grafana:latest
    container_name: aivn-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_INSTALL_PLUGINS=https://storage.googleapis.com/integration-artifacts/grafana-lokiexplore-app/grafana-lokiexplore-app-latest.zip;grafana-lokiexplore-app
    networks:
      - aio-network

  statsd-exporter:
    image: prom/statsd-exporter:latest
    container_name: aivn-statsd-exporter
    restart: unless-stopped
    ports:
      - "9102:9102"   # Prometheus scrape
      - "8125:8125/udp"  # StatsD UDP input from Airflow
    volumes:
      - ./statsd/statsd_mapping.yml:/etc/statsd/statsd_mapping.yml:ro
    command:
      - "--statsd.mapping-config=/etc/statsd/statsd_mapping.yml"
      - "--statsd.listen-udp=:8125"
      - "--web.listen-address=:9102"
    networks:
      - aio-network

  promtail:
    image: grafana/promtail:latest
    container_name: aivn-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - aio-network

  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    command:
      - '--path.rootfs=/host'
    ports:
      - "9100:9100"
    pid: host
    restart: unless-stopped
    volumes:
      - '/:/host:ro'
    networks:
      - aio-network



networks:
  aio-network:
    external: true

volumes:
  grafana-storage: {}
