global:
  scrape_interval: 10s
  scrape_timeout: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["node_exporter:9100"]

  # FastAPI — HTTP request counts, latency, churn predictions, Feast lookups
  - job_name: "churn_api"
    static_configs:
      - targets: ["churn-prediction-api:8000"]
    metrics_path: "/metrics"

  # Airflow — DAG/task durations, scheduler heartbeat, executor slots
  - job_name: "airflow"
    static_configs:
      - targets: ["statsd-exporter:9102"]