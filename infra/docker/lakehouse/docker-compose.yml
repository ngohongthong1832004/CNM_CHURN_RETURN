services:
  # ── Iceberg REST Catalog (Nessie) ──────────────────────────────────────────
  nessie:
    image: ghcr.io/projectnessie/nessie:latest
    container_name: aio_nessie
    ports:
      - "19120:19120"
    environment:
      - QUARKUS_PROFILE=prod
    volumes:
      # Quarkus đọc tự động /deployments/config/application.properties (cùng thư mục với jar)
      # Dùng file thay vì env vars vì access-key trong Nessie 0.107+ là URN secret reference,
      # không thể biểu diễn qua env var đơn giản.
      - ./nessie-config/application.properties:/deployments/config/application.properties:ro
    networks:
      - aio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Tạo bucket lakehouse trên MinIO (chạy 1 lần) ──────────────────────────
  mc-lakehouse:
    image: minio/mc:latest
    container_name: aio_mc_lakehouse
    depends_on:
      nessie:
        condition: service_healthy
    networks:
      - aio-network
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minio minio123 &&
      mc mb --ignore-existing minio/lakehouse &&
      echo 'Bucket lakehouse ready.';
      exit 0;
      "

  # ── Trino SQL engine ───────────────────────────────────────────────────────
  trino:
    image: trinodb/trino:440
    container_name: aio_trino
    ports:
      - "8090:8080"
    volumes:
      - ./trino/etc:/etc/trino
      - ./trino/catalog:/etc/trino/catalog
    networks:
      - aio-network
    depends_on:
      nessie:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Apache Superset ────────────────────────────────────────────────────────
  superset:
    build:
      context: ./superset
      dockerfile: Dockerfile
    image: aio_superset
    container_name: aio_superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "aio2025-superset-secret-key-changeme"
      SUPERSET_ADMIN_USERNAME: "admin"
      SUPERSET_ADMIN_PASSWORD: "admin"
      SUPERSET_ADMIN_EMAIL: "admin@superset.com"
      SQLALCHEMY_DATABASE_URI: "sqlite:////app/superset_home/superset.db?check_same_thread=false"
    volumes:
      - superset-home:/app/superset_home
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - ./superset/init.sh:/app/docker/docker-init.sh
    command: ["/bin/bash", "/app/docker/docker-init.sh"]
    networks:
      - aio-network
    depends_on:
      trino:
        condition: service_healthy

volumes:
  superset-home:

networks:
  aio-network:
    external: true
