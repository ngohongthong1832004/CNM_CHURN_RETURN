# Nessie 0.107.4 Catalog — S3/MinIO Configuration
#
# access-key là URN tới secret, KHÔNG phải inline value.
# Format từ official Nessie docs:
#   nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:quarkus:<prefix>
#   <prefix>.name=<access-key-id>
#   <prefix>.secret=<secret-access-key>
#
# QUAN TRỌNG: prefix phải nằm NGOÀI namespace nessie.* vì quarkus.config.mapping.validate-unknown=true
# sẽ báo lỗi nếu đặt dưới nessie.catalog.secrets.*

# S3 / MinIO connection
nessie.catalog.service.s3.default-options.endpoint=http://minio:9000
nessie.catalog.service.s3.default-options.path-style-access=true
nessie.catalog.service.s3.default-options.region=us-east-1
nessie.catalog.service.s3.default-options.auth-type=STATIC
nessie.catalog.service.s3.default-options.access-key=urn:nessie-secret:quarkus:minio.credentials

# Credentials — prefix "minio.credentials" khớp với URN ở trên
minio.credentials.name=minio
minio.credentials.secret=minio123

# Warehouse
nessie.catalog.default-warehouse=warehouse
nessie.catalog.warehouses.warehouse.location=s3://lakehouse/

# Version store (dùng dots, không phải hyphen — theo official application.properties)
nessie.version.store.type=IN_MEMORY
