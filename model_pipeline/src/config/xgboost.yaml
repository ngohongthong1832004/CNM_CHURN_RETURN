mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "test_churn_prediction_xgboost_v1.1"
  artifact_location: "s3://mlflow/"
  registry_uri: "http://localhost:5000"
  tags:
    task: "churn_prediction"
    purpose: "test"
    model_family: "xgboost"

model:
  model_type: "xgboost"
  name: "xgboost_churn"
  version: "1.0.0"
  type: "classifier"
  description: "XGBoost model for churn prediction"
  train_test_split: 0.2
  random_state: 42

  parameters:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 5
    gamma: 0.1
    reg_alpha: 0.1       # L1
    reg_lambda: 1.0      # L2
    scale_pos_weight: 1  # điều chỉnh nếu imbalanced (= n_neg / n_pos)
    eval_metric: "logloss"
    random_state: 42
    n_jobs: -1
    verbosity: 0

evaluation:
  thresholds:
    accuracy_score: 0.8
    f1_score: 0.8

features:
  target_column: churned
  training_features:
    - age
    - gender
    - tenure_months
    - usage_frequency
    - support_calls
    - payment_delay_days
    - subscription_type
    - contract_length
    - total_spend
    - last_interaction_days
